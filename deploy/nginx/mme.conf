# MME · Agent 评测平台 — Nginx 站点（生产）
#
# 安装：见 deploy/nginx/README.md
# 使用前请替换：
#   - eval.example.com → 你的域名
#   - /var/www/mme/frontend/dist → 宿主机上前端构建产物路径
#
# SPA 双保险：本文件 location / 使用 try_files；未命中静态时由 index.html 承接，
# 若仍反代到 app，FastAPI server/spa_static.py 也会回退 index.html。

upstream mme_app {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name eval.example.com;

    client_max_body_size 20m;

    root /var/www/mme/frontend/dist;
    index index.html;

    # API → Docker app（FastAPI）
    location /api/ {
        proxy_pass http://mme_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Vite 哈希资源：只走磁盘，长期缓存
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 根目录其它静态（favicon 等）
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }

    # SPA：客户端路由（/runs、/runs/1/...）回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# certbot --nginx -d eval.example.com 会在此文件追加 listen 443 ssl 的 server 块。
# 签发后请确认 HTTPS server 内同样包含上述 location /api/、/assets/、/ 规则
# （certbot 通常会自动复制；若手工维护 SSL 块，请与 HTTP 段保持一致）。
