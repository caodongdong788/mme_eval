<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MME · 链接与强调色预览</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111827;
      --ink-secondary: #374151;
      --muted: #9ca3af;
      --border: #f3f4f6;
      --border-strong: #e5e7eb;
      --primary: #111827;
      --primary-strong: #374151;
      --primary-soft: #f3f4f6;
      --pass: #1f8a5b;
      --warn: #c6841f;
      --fail: #c1453a;
      --link: #0d6b5c;
      --link-hover: #0a5549;
      --link-underline: rgba(13, 107, 92, 0.38);
      --sider-tint: rgba(13, 107, 92, 0.06);
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
        "Inter", "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: #fafafa;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .page-header {
      padding: 32px 40px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-strong);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .page-header h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .page-header p {
      margin: 0;
      font-size: 14px;
      color: var(--ink-secondary);
      max-width: 720px;
      line-height: 1.55;
    }
    .toggle-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .toggle-btn {
      border: 1px solid var(--border-strong);
      background: var(--bg);
      color: var(--ink-secondary);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .toggle-btn:hover { background: #fafafa; color: var(--ink); }
    .toggle-btn.is-active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 32px 40px 48px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 960px) {
      .compare { grid-template-columns: 1fr; padding: 24px 20px 40px; }
    }

    .panel {
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-label {
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-label strong {
      color: var(--ink);
      font-size: 13px;
      letter-spacing: 0;
      text-transform: none;
    }
    .panel-body { padding: 24px 20px 28px; }

    /* ---- 现状：墨黑链接 ---- */
    .scheme-current a.inline-link {
      color: var(--primary);
      text-decoration: none;
    }
    .scheme-current a.inline-link:hover { text-decoration: underline; }
    .scheme-current .btn-link {
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      color: var(--primary);
      cursor: pointer;
    }
    .scheme-current .btn-link:hover { text-decoration: underline; }
    .scheme-current .btn-link.secondary { color: var(--muted); }
    .scheme-current .sider-item.selected {
      background: var(--primary-soft);
      color: var(--primary);
    }

    /* ---- 提议：Teal 链接 + 默认下划线 ---- */
    .scheme-proposed a.inline-link {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--link-underline);
    }
    .scheme-proposed a.inline-link:hover {
      color: var(--link-hover);
      text-decoration-color: var(--link-hover);
    }
    .scheme-proposed .btn-link {
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      font-weight: 500;
      color: var(--link);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: var(--link-underline);
    }
    .scheme-proposed .btn-link:hover {
      color: var(--link-hover);
      text-decoration-color: var(--link-hover);
    }
    .scheme-proposed .btn-link.secondary {
      color: var(--muted);
      font-weight: 400;
      text-decoration-style: dotted;
    }
    .scheme-proposed .btn-link.secondary:hover { color: var(--ink-secondary); }
    .scheme-proposed .sider-item.selected {
      background: var(--sider-tint);
      color: var(--link);
    }
    .scheme-proposed .external::after {
      content: " ↗";
      font-size: 0.85em;
      opacity: 0.7;
    }

    /* ---- 共用 mock UI ---- */
    .mock-app {
      display: grid;
      grid-template-columns: 168px 1fr;
      gap: 0;
      min-height: 520px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .mock-sider {
      border-right: 1px solid var(--border);
      padding: 16px 10px;
      background: var(--bg);
    }
    .mock-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px 16px;
      font-size: 13px;
      font-weight: 600;
    }
    .mock-brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: linear-gradient(145deg, #111827, #374151);
    }
    .sider-item {
      display: block;
      padding: 8px 10px;
      margin-bottom: 2px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--ink-secondary);
      text-decoration: none;
    }
    .sider-item:hover { background: #fafafa; }
    .mock-main { padding: 20px 22px; }
    .mock-title {
      font-size: 17px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .mock-desc {
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      margin-bottom: 24px;
      border-top: 1px solid var(--border-strong);
      border-bottom: 1px solid var(--border-strong);
      padding: 16px 0;
    }
    .kpi {
      padding: 0 16px;
      border-right: 1px solid var(--border-strong);
    }
    .kpi:first-child { padding-left: 0; }
    .kpi:last-child { border-right: none; padding-right: 0; }
    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .kpi-value {
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .kpi-value.pass { color: var(--pass); }
    .kpi-value.fail { color: var(--fail); }

    .prose {
      font-size: 14px;
      line-height: 1.65;
      color: var(--ink-secondary);
      margin-bottom: 20px;
    }
    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 20px;
      align-items: center;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0 12px 10px 0;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 12px 14px 0;
      border-bottom: 1px solid var(--border);
      color: var(--ink-secondary);
      vertical-align: middle;
    }
    td.mono {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink);
    }
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: 1px;
    }
    .status-dot.pass { background: var(--pass); }
    .status-dot.fail { background: var(--fail); }
    .row-fail td:first-child {
      box-shadow: inset 3px 0 0 var(--fail);
      padding-left: 10px;
    }
    .hint {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      border-left: 3px solid var(--warn);
      background: #fafafa;
      font-size: 12px;
      color: var(--ink-secondary);
      line-height: 1.5;
    }

    .solo-view .panel.hidden { display: none; }
    .solo-view .compare { grid-template-columns: 1fr; max-width: 720px; }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>链接与强调色 · 预览对比</h1>
    <p>
      左侧为<strong>现状</strong>（墨黑链接、hover 才下划线）；右侧为<strong>提议</strong>（Muted Teal 链接色、默认下划线、侧栏选中微 tint、外链 ↗）。
      不修改正式代码，仅供决策参考。
    </p>
    <div class="toggle-row">
      <button class="toggle-btn is-active" data-view="split">左右对比</button>
      <button class="toggle-btn" data-view="current">仅看现状</button>
      <button class="toggle-btn" data-view="proposed">仅看提议</button>
    </div>
  </header>

  <div class="compare" id="compare">
    <section class="panel" data-panel="current">
      <div class="panel-label">
        <strong>现状 · Ink Only</strong>
        <span>链接 = 正文墨黑</span>
      </div>
      <div class="panel-body scheme-current" id="panel-current"></div>
    </section>

    <section class="panel" data-panel="proposed">
      <div class="panel-label">
        <strong>提议 · Muted Teal Links</strong>
        <span>#0D6B5C 链接色</span>
      </div>
      <div class="panel-body scheme-proposed" id="panel-proposed"></div>
    </section>
  </div>

  <script>
    const mockHtml = (scheme) => `
      <div class="mock-app">
        <aside class="mock-sider">
          <div class="mock-brand">
            <div class="mock-brand-mark"></div>
            MME
          </div>
          <a class="sider-item" href="#">评测列表</a>
          <a class="sider-item selected" href="#">Run 看板</a>
          <a class="sider-item" href="#">人审队列</a>
        </aside>
        <main class="mock-main">
          <h2 class="mock-title">bc_smoke_2026-06-16</h2>
          <p class="mock-desc">
            对比源：
            <a class="inline-link${scheme === "proposed" ? " external" : ""}" href="#">baseline_main</a>
            · 判分 fingerprint 已变更
          </p>
          <div class="kpi-row">
            <div class="kpi">
              <div class="kpi-label">通过率</div>
              <div class="kpi-value pass">87.2%</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">HardGate 失败</div>
              <div class="kpi-value fail">3</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">待人审</div>
              <div class="kpi-value">12</div>
            </div>
          </div>
          <p class="prose">
            用例 <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink)">bc_rf_014</span>
            需查看
            <a class="inline-link${scheme === "proposed" ? " external" : ""}" href="#">Langfuse 留痕</a>
            与
            <a class="inline-link" href="#">判分详情</a>。
          </p>
          <div class="link-row">
            <button type="button" class="btn-link">查看 Diff</button>
            <button type="button" class="btn-link">导出报告</button>
            <button type="button" class="btn-link secondary">重置筛选</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>用例</th>
                  <th>上线</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="mono">bc_sym_003</td>
                  <td><span class="status-dot pass"></span>通过</td>
                  <td><button type="button" class="btn-link">详情</button></td>
                </tr>
                <tr class="row-fail">
                  <td class="mono">bc_rf_014</td>
                  <td><span class="status-dot fail"></span>失败</td>
                  <td><button type="button" class="btn-link">人审</button></td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="hint">
            <strong>找链接：</strong>试着不用 hover，扫一眼能否立刻看到「Langfuse 留痕」「查看 Diff」「详情」是可点的。
          </div>
        </main>
      </div>
    `;

    document.getElementById("panel-current").innerHTML = mockHtml("current");
    document.getElementById("panel-proposed").innerHTML = mockHtml("proposed");

    const compare = document.getElementById("compare");
    const buttons = document.querySelectorAll(".toggle-btn");
    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        buttons.forEach((b) => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        const view = btn.dataset.view;
        compare.classList.toggle("solo-view", view !== "split");
        document.querySelector('[data-panel="current"]').classList.toggle("hidden", view === "proposed");
        document.querySelector('[data-panel="proposed"]').classList.toggle("hidden", view === "current");
      });
    });
  </script>
</body>
</html>
